# autobench/edge_deploy.yaml
tool: autobench
repo_path: /ads_storage/autobench
github_url: https://github.com/pedrochagasmaster/autobench.git
bitbucket_url: https://scm.mastercard.int/stash/scm/~e176097/autobench.git
release_branch: main
runtime_paths: [benchmark.py, tui_app.py, shared_runtime.py, install.sh, onboard.sh, run_tool.sh, setup_alias.sh, setup_remote_env.sh, update.sh, bin/autobench, bin/autobench-cli, bin/runtime_check.sh, "core/**/*.py", "utils/**/*.py", "scripts/**/*.py", "tools/prod_tui/**/*.py"]
compile_targets: "benchmark.py tui_app.py core utils scripts tools"
version_files: [VERSION, pyproject.toml]
install_trigger_paths: [shared_runtime.py, install.sh, setup_remote_env.sh, bin/autobench, bin/autobench-cli, bin/runtime_check.sh, requirements.txt, constraints.txt, pyproject.toml]
dependency_paths: [requirements.txt, constraints.txt]
dependency_bundle:
  requirements_file: requirements.txt
  constraints_file: constraints.txt
  python_version: "3.10"
  implementation: cp
  abi: cp310
  platform: manylinux2014_x86_64
smoke:
  standard:
    - "/ads_storage/autobench/bin/autobench-cli config list"
    - "/ads_storage/autobench/bin/autobench-cli share --help"
  deep: []                       # autobench's fixture run is offline; no Kerberos
sensitive_paths: []
tui_chrome_regex: "Privacy-Compliant Peer Benchmark|Control 3.2 dimensional analysis"
tui_exit: ctrl_c                 # autobench TUI has no q/escape quit; CLI smoke avoids the TUI anyway
