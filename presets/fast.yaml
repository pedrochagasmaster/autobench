version: "3.0"
preset_name: "fast"
description: "Fastest execution - disable subset search, accept any solution (Quick analysis)"

# Scenario 6: Disable Subset Search (Fastest)
# - No subset search at all
# - Accept any solution LP produces
# - Fastest execution time

optimization:
  bounds:
    max_weight: 10.0
    min_weight: 0.01
  
  linear_programming:
    max_iterations: 500  # Reduced iterations
    tolerance: 2.0  # Relaxed tolerance
  
  constraints:
    volume_preservation: 0.5  # Moderate rank preservation
  
  subset_search:
    enabled: false  # Disable subset search
    strategy: "greedy"
    max_tests: 100
    trigger_on_slack: false  # Accept slack
    max_slack_threshold: 0.0
    prefer_slacks_first: false
  
  bayesian:
    max_iterations: 50  # Reduced iterations
    learning_rate: 0.02

analysis:
  best_in_class_percentile: 0.85

output:
  include_debug_sheets: false  # Faster without debug sheets
