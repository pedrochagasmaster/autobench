version: "3.0"
preset_name: "flexible_dimensions"
description: "Relaxed before dropping - try all options to keep all dimensions (Development use)"

# Scenario 2: Relaxed Before Dropping
# - Try relaxing rank preservation before dropping dimensions
# - Keep all dimensions if possible, even if peer ordering changes
# - Still strict about slack violations

optimization:
  bounds:
    max_weight: 15.0  # More flexibility
    min_weight: 0.01
  
  linear_programming:
    max_iterations: 1000
    tolerance: 0.0  # Still strict
  
  constraints:
    volume_preservation: 1.0  # Start with strong preservation
  
  subset_search:
    enabled: true
    strategy: "random"  # More thorough search
    max_tests: 300
    trigger_on_slack: true
    max_slack_threshold: 0.0
    prefer_slacks_first: true  # Try relaxing rank preservation first
  
  bayesian:
    max_iterations: 150
    learning_rate: 0.01

analysis:
  best_in_class_percentile: 0.85

output:
  include_debug_sheets: true
