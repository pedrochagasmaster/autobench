version: "3.0"
preset_name: "balanced_default"
description: "Standard Analysis - Balance of compliance and consistency (formerly standard)"

# Intent: "I want the best of both worlds."
# Priority: Good balance of compliance and consistency.
# Trade-off: Allows very small violations (2%) before dropping dimensions.

optimization:
  bounds:
    max_weight: 10.0
    min_weight: 0.01
  
  linear_programming:
    max_iterations: 1000
    tolerance: 2.0  # Small buffer for practical feasibility
  
  constraints:
    volume_preservation: 1.0  # Strong rank preservation
  
  subset_search:
    enabled: true
    strategy: "random"
    max_tests: 200
    trigger_on_slack: true
    max_slack_threshold: 0.05  # Allow tiny slack before triggering search
    prefer_slacks_first: false
  
  bayesian:
    max_iterations: 100
    learning_rate: 0.01

analysis:
  best_in_class_percentile: 0.85

output:
  include_debug_sheets: true
