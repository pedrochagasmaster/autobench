version: "3.0"
preset_name: "balanced"
description: "Moderate slack tolerance - accept small violations, search for large ones (Recommended)"

# Scenario 5: Moderate Slack Tolerance
# - Accept small slack violations (≤2 pp)
# - Search for better solutions if violations are significant (>2 pp)
# - Balanced approach for most use cases

optimization:
  bounds:
    max_weight: 10.0
    min_weight: 0.01
  
  linear_programming:
    max_iterations: 1000
    tolerance: 1.0  # Moderate tolerance
  
  constraints:
    volume_preservation: 0.8  # Strong-ish rank preservation
  
  subset_search:
    enabled: true
    strategy: "greedy"
    max_tests: 250
    trigger_on_slack: true
    max_slack_threshold: 2.0  # Accept violations ≤2 pp
    prefer_slacks_first: true  # Try relaxing first
  
  bayesian:
    max_iterations: 100
    learning_rate: 0.01

analysis:
  best_in_class_percentile: 0.85

output:
  include_debug_sheets: true
