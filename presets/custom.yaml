version: "3.0"
preset_name: "strict_privacy"
description: "Maximum strictness - zero tolerance for privacy violations (Production use)"

# Scenario 1: Maximum Strictness
# - Zero tolerance for privacy cap violations
# - Always search for cleanest solution
# - Drop dimensions if needed to maintain strict privacy

optimization:
  bounds:
    max_weight: 10.0
    min_weight: 0.01
  
  linear_programming:
    max_iterations: 1000
    tolerance: 0.0

  constraints:
    volume_preservation: 0.8  # Strong rank preservation
  
  subset_search:
    enabled: true
    strategy: "random"
    max_tests: 2000
    trigger_on_slack: true
    max_slack_threshold: 0.01
    prefer_slacks_first: True 
  
  bayesian:
    max_iterations: 100
    learning_rate: 0.01

analysis:
  best_in_class_percentile: 0.85

output:
  include_debug_sheets: true
