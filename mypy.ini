[mypy]
python_version = 3.8
strict = True
warn_unused_configs = True
exclude = (?x)(
    ^benchmark\.py$|
    ^tui_app\.py$
)

[mypy-scipy.*]
ignore_missing_imports = True

[mypy-openpyxl.*]
ignore_missing_imports = True

[mypy-pypyodbc.*]
ignore_missing_imports = True

[mypy-textual.*]
ignore_missing_imports = True
