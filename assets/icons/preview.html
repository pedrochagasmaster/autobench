<!doctype html><html lang="en"><head><meta charset="utf-8"/><title>Autobench icon set</title>
<style>
:root{--orange:#FF671B;--ink:#1A1A1A;--hair:#E6E2DC;--panel:#FBFAF8;--deep:#1D2735;}
*{box-sizing:border-box;}
body{margin:0;font-family:"Segoe UI",system-ui,sans-serif;color:var(--ink);background:#fff;padding:40px;}
h1{font-size:22px;margin:0 0 4px;}
p.sub{color:#656A71;margin:0 0 28px;font-size:13px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:14px;}
.cell{border:1px solid var(--hair);border-radius:10px;padding:16px 10px 10px;text-align:center;background:var(--panel);}
.cell svg{width:34px;height:34px;color:var(--orange);}
.cell .nm{margin-top:10px;font-size:11px;color:#3C3F44;font-family:ui-monospace,Consolas,monospace;}
</style></head><body>
