<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="Subset Search and Per-Dimension LP">
  <title>Subset Search &amp; Per-Dimension LP</title>
  <!-- Full candidate set of dimensions (3x3 grid) -->
  <!-- Unselected dimensions (faded) -->
  <circle cx="35" cy="13" r="2.5" stroke-opacity="0.35"/>
  <circle cx="35" cy="24" r="2.5" stroke-opacity="0.35"/>
  <circle cx="13" cy="35" r="2.5" stroke-opacity="0.35"/>
  <circle cx="24" cy="35" r="2.5" stroke-opacity="0.35"/>
  <circle cx="35" cy="35" r="2.5" stroke-opacity="0.35"/>
  <!-- Selected = largest feasible subset (solid) -->
  <circle cx="13" cy="13" r="2.9" fill="currentColor" stroke="none"/>
  <circle cx="24" cy="13" r="2.9" fill="currentColor" stroke="none"/>
  <circle cx="13" cy="24" r="2.9" fill="currentColor" stroke="none"/>
  <circle cx="24" cy="24" r="2.9" fill="currentColor" stroke="none"/>
  <!-- Selection marquee isolating the chosen subset -->
  <rect x="7" y="7" width="24" height="24" rx="4.5"/>
</svg>
