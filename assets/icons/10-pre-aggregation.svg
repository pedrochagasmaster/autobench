<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="Pre-Aggregation">
  <title>Pre-Aggregation</title>
  <!-- Duplicate rows merge into a single consolidated record -->
  <line x1="11" y1="13" x2="25" y2="24"/>
  <line x1="11" y1="24" x2="25" y2="24"/>
  <line x1="11" y1="35" x2="25" y2="24"/>
  <line x1="25" y1="24" x2="37" y2="24"/>
  <!-- Source rows -->
  <circle cx="9" cy="13" r="2.7" fill="#ffffff"/>
  <circle cx="9" cy="24" r="2.7" fill="#ffffff"/>
  <circle cx="9" cy="35" r="2.7" fill="#ffffff"/>
  <!-- Consolidated output -->
  <circle cx="39" cy="24" r="3.6" fill="currentColor" stroke="none"/>
</svg>
