<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="Estimate and Project">
  <title>Estimate &amp; Project</title>
  <!-- Gauge dial = projected memory load -->
