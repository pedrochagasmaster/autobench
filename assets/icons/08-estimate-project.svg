  <line x1="13.2" y1="19.8" x2="15.7" y2="22.3" stroke-opacity="0.4"/>
  <line x1="24" y1="15" x2="24" y2="18.5" stroke-opacity="0.4"/>
  <line x1="34.8" y1="19.8" x2="32.3" y2="22.3" stroke-opacity="0.4"/>
  <line x1="40" y1="31" x2="36.5" y2="31" stroke-opacity="0.4"/>
