# Privacy-Compliant Benchmarking Tool - Configuration Template
# Version: 3.0
# 
# Copy this file and customize for your analysis needs.
# For preset configurations, see: benchmark config list

version: "3.0"

# Compliance posture is mandatory and public:
# - strict: final compliant verdict is required
# - best_effort: attempts compliance, but labeled non-compliant/indeterminate outputs may complete
# - accuracy_first: prioritizes fidelity and requires explicit runtime acknowledgement
compliance_posture: "strict"

# ============================================================================
# NOTE: Column names are specified via CLI flags, not in config files
# ============================================================================
# Use these CLI flags to specify your data columns:
#   --entity-col: Column containing entity identifiers (e.g., "issuer_name")
#   --metric: Column to analyze (e.g., "tpv", "transaction_amount")
#   --time-col: Column for time-aware analysis (e.g., "ano_mes")
#   --dimensions: Dimension columns for analysis (e.g., "credit_debit_flag tipo_compra")
#
# Column names must match exactly as they appear in your dataset (after normalization)

# ============================================================================
# INPUT SETTINGS
# ============================================================================
input:
  # Schema detection mode for DataLoader (controls minimal/full schema checks)
  # - heuristic: infer by column name patterns
  # - mapped: use column_mappings only (strict)
  # - hybrid: try mappings first, then fall back to heuristics
  schema_detection_mode: "heuristic"
  # Optional CSV guardrails (null disables limit)
  max_csv_size_mb: null
  max_csv_rows: null
  csv_chunk_size: null
  # When dimensions are explicit, load only entity/time/metric/dimension columns.
  # This reduces memory use on very wide CSV files. Disable only if downstream
  # custom code needs unused columns in the in-memory DataFrame.
  project_csv_columns: true
  # Adaptive batching estimates CSV size before loading. For heavy explicit-
  # dimension runs with input validation disabled, it streams chunks and
  # pre-aggregates duplicate entity/dimension/time rows to reduce memory and CPU
  # before optimization/reporting. Privacy caps still run on final aggregates.
  adaptive_batching: true
  batch_row_threshold: 250000
  batch_file_size_mb: 256.0
  batch_compaction_chunks: 20

# ============================================================================
# RUNTIME RESOURCE PROFILE
# ============================================================================
runtime:
  # Lean mode is for memory-limited remote servers and massive CSVs. It keeps
  # privacy-cap enforcement intact while disabling optional heavy artifacts
  # (debug/privacy sheets, impact/preset comparison, audit log), disables subset
  # search, forces analysis-only output, sets csv_chunk_size, and requires
  # explicit --dimensions so adaptive batching can safely pre-aggregate.
  lean_mode: false

# ============================================================================
# OUTPUT SETTINGS
# ============================================================================
output:
  # Output format (currently only xlsx supported)
  format: "xlsx"
  
  # Include debug sheets with unweighted metrics
  include_debug_sheets: true
  
  # Include detailed privacy validation sheet
  include_privacy_validation: true

  # Include impact analysis sheets (raw vs balanced)
  include_impact_summary: true

  # Include audit log output
  include_audit_log: true

  # Include audit package zip (workbook(s), optional CSV, audit log, config snapshot)
  include_audit_package: false

  # Impact highlighting thresholds (percentage points)
  impact_thresholds:
    high_pp: 1.0
    low_pp: 0.25
  
  # Logging level: DEBUG, INFO, WARNING, ERROR
  log_level: "INFO"

# ============================================================================
# PRIVACY SETTINGS
# ============================================================================
# Privacy rules are automatically determined based on the number of peers
# in the dataset according to Mastercard Control 3.2:
# - 4 peers (merchant_mode only): max 35% concentration
# - 5 peers: max 25% concentration  
# - 6 peers: max 30% concentration
# - 7 peers: max 35% concentration
# - 10+ peers: max 40% concentration
#
# No configuration needed - the tool automatically applies the correct rule.

# Run-level Control 3 policy declarations. These do not change the optimizer;
# they provide explicit evidence for policy gates that cannot be inferred from
# the data safely.
control3:
  # For fraud/chargeback issuer benchmarking concentration checks, use
  # clearing_spend. Other values are only valid for non-fraud/non-chargeback
  # runs where the canonical document does not require clearing spend.
  privacy_basis: null

  # Control 3.4: digital-wallet metrics require case-by-case Privacy review.
  contains_digital_wallet_metrics: false
  digital_wallet_review_approved: false

  # Control 3.2/3.3: top-merchant lists are blocked; dual entity axes require
  # manual Privacy review because both entity groups must be protected.
  contains_top_merchant_output: false
  dual_entity_axis: false
  dual_entity_axis_review_approved: false

  # Recurring deliverables must be re-checked when the peer group changes and
  # at least annually even if unchanged.
  recurring_deliverable: false
  last_privacy_recheck_date: null  # YYYY-MM-DD
  peer_group_altered: false

# ============================================================================
# OPTIMIZATION SETTINGS
# ============================================================================
# Note: Global weighting mode (consistent weights) is now the DEFAULT
#   Default: Single set of weights used across all dimensions (global weights)
#   With --per-dimension-weights flag: Each dimension optimized independently
optimization:
  # Linear Programming settings
  linear_programming:
    # Maximum iterations for LP solver
    max_iterations: 1000
    
    # Tolerance for privacy violations (percentage points)
    # Higher tolerance = more flexibility, less strict privacy
    tolerance: 1.0
    
    # Volume-weighted slack penalties
    # When true, violations in high-volume categories are penalized more heavily
    # This minimizes violations where they have the most business impact
    volume_weighted_penalties: false
    
    # Exponent for volume weighting (only used if volume_weighted_penalties=true)
    # 1.0 = linear weighting, 2.0 = quadratic (stronger emphasis on large volumes)
    volume_weighting_exponent: 1.0

    # Rank constraint strategy (reduces O(P^2) constraints for large peer sets)
    # mode: all (default) or neighbor (only enforces order for nearest peers)
    # neighbor_k: number of adjacent peers to constrain when mode=neighbor
    rank_constraints:
      mode: all
      neighbor_k: 1
  
  # Weight bounds
  bounds:
    # Maximum weight multiplier for any peer
    max_weight: 10.0
    
    # Minimum weight multiplier for any peer
    min_weight: 0.01
  
  # Constraint settings
  constraints:
    # Rank preservation strength (0.0-1.0)
    # Controls how strongly the optimizer preserves the original peer ranking by volume
    # 0.0 = No rank preservation (weights can freely reorder peers)
    # 1.0 = Strong rank preservation (maintain original peer ordering)
    volume_preservation: 0.5

    # Weight consistency mode: global (single weight-set) or per_dimension
    consistency_mode: global

    # If true, enforce a single global weight-set and disable per-dimension fallback
    enforce_single_weight_set: false
    
    # Enforce additional Control 3.2 rule conditions (6/30, 7/35, 10/40)
    enforce_additional_constraints: true

    # Dynamic constraints to handle sparse or unrepresentative buckets
    dynamic_constraints:
      enabled: false
      # Minimum peer count in a category/time bucket to enforce additional constraints
      min_peer_count: 4
      # Minimum effective peer count (1/sum(share^2)) to enforce additional constraints
      min_effective_peer_count: 3.0
      # Minimum share of volume within the dimension/time slice
      min_category_volume_share: 0.001
      # Minimum share of overall volume
      min_overall_volume_share: 0.0005
      # Minimum representativeness score to enforce additional constraints
      min_representativeness: 0.1
      # Floor for scaling additional-constraint thresholds in sparse buckets
      threshold_scale_floor: 0.6
      # Floor for scaling required participant counts in sparse buckets
      count_scale_floor: 0.5
      # Minimum penalty weight for low-representativeness buckets
      penalty_floor: 0.25
      # Exponent for representativeness penalty weighting
      penalty_power: 1.0
  
  # Subset search settings (only applies to default global weighting mode)
  # Subset search tries to find optimal dimension combinations when all dimensions together
  # violate privacy constraints
  #
  # For detailed explanation of how these parameters interact, see: SUBSET_SEARCH_SCENARIOS.md
  subset_search:
    # Enable subset search when LP completely fails to find a solution
    # If true and LP fails: Search for largest feasible dimension subset
    # If false and LP fails: Fall back to per-dimension optimization
    enabled: true
    
    # Search strategy: greedy, random
    # greedy = iteratively remove most unbalanced dimension (fastest, deterministic)
    # random = test random dimension combinations (more thorough, non-deterministic)
    strategy: "greedy"
    
    # Maximum subset combinations to test (for random strategy)
    max_attempts: 200
    
    # Trigger subset search even when LP succeeds but uses privacy cap slack
    # If true: Search for better solution when LP succeeds but violates max_slack_threshold
    # If false: Accept LP solution even if it uses slack
    # Note: This is INDEPENDENT of 'enabled' - controls different trigger condition
    trigger_on_slack: true
    
    # Maximum slack threshold (in percentage points)
    # If LP cap slack sum exceeds this and trigger_on_slack=true, trigger subset search
    # 0.0 = trigger on any slack usage (strictest)
    # 2.0 = trigger only on violations > 2 percentage points (moderate)
    # Only used when trigger_on_slack=true
    max_slack_threshold: 0.0
    
    # Try LP with rank_preservation=0 before dropping dimensions
    # If true: When LP fails, first try without rank preservation penalty
    # If false: Go directly to subset search when LP fails
    # Only used when enabled=true
    #
    # Recommended scenarios:
    # - prefer_slacks_first=true: Keep all dimensions if possible, even if peer ordering changes
    # - prefer_slacks_first=false: Drop dimensions sooner to maintain rank preservation
    prefer_slacks_first: false
  
  # Bayesian optimization settings (fallback when LP fails)
  bayesian:
    # Maximum iterations
    max_iterations: 500
    
    # Learning rate
    learning_rate: 0.01

    # Penalty multiplier for cap/additional-constraint violations
    violation_penalty_weight: 1000.0

# ============================================================================
# ANALYSIS SETTINGS
# ============================================================================
analysis:
  # Best-in-class percentile (0.0-1.0)
  # For approval rates and share analysis: Uses this value (0.85 = 85th percentile, higher is better)
  # For fraud rates: Automatically uses (1 - this value) = 0.15 = 15th percentile (lower is better)
  best_in_class_percentile: 0.85
  
  # Auto-detect dimensions from data (if --auto flag used)
  auto_detect_dimensions: false

  # Merchant benchmarking mode (enables 4/35 rule for 4 peers)
  merchant_mode: false
