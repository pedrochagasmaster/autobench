<!DOCTYPE html>
<html>
<head>
    <title>TUI Mockups Viewer</title>
    <style>
        body {
            background: #1a1a1a;
            color: #fff;
            font-family: monospace;
            padding: 20px;
        }
        .image-container {
            margin: 40px 0;
            border: 2px solid #444;
            padding: 20px;
            background: #222;
        }
        h2 {
            color: #4af;
            margin-bottom: 20px;
        }
        img {
            max-width: 100%;
            border: 1px solid #666;
            display: block;
        }
    </style>
</head>
<body>
    <h1>TUI Design Mockups</h1>
    
    <div class="image-container">
        <h2>1. Overview Screen</h2>
        <img src="file:///tmp/tui_overview.png" alt="TUI Overview">
    </div>
    
    <div class="image-container">
        <h2>2. New Job Screen</h2>
        <img src="file:///tmp/tui_new_job.png" alt="TUI New Job">
    </div>
    
    <div class="image-container">
        <h2>3. SQL Preview Screen</h2>
        <img src="file:///tmp/tui_sql_preview.png" alt="TUI SQL Preview">
    </div>
    
    <div class="image-container">
        <h2>4. View Logs Screen</h2>
        <img src="file:///tmp/tui_view_logs.png" alt="TUI View Logs">
    </div>
    
    <div class="image-container">
        <h2>5. History Screen</h2>
        <img src="file:///tmp/tui_history.png" alt="TUI History">
    </div>
    
    <div class="image-container">
        <h2>6. Browse Screen</h2>
        <img src="file:///tmp/tui_browse.png" alt="TUI Browse">
    </div>
    
    <div class="image-container">
        <h2>7. Composite View</h2>
        <img src="file:///tmp/tui_composite.png" alt="TUI Composite">
    </div>
</body>
</html>
